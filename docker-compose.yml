version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: doctorapp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: doctorappointmentdb
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: doctorapp-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/doctorappointmentdb
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: ${JWT_SECRET:-ChangeThisSecretKeyBeforeGoingToProductionPlease123!}
      MAIL_USERNAME: ${MAIL_USERNAME:-your-email@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-your-app-password}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_replace_with_key}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-replace_with_secret}
    ports:
      - "8080:8080"

volumes:
  mysql-data:
