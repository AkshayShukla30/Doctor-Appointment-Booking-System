spring.application.name=doctor-appointment-backend
server.port=${SERVER_PORT:8080}

# --- Database ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/doctorappointmentdb}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.mapper.accept-case-insensitive-enums=true

# --- JWT ---
jwt.secret=${JWT_SECRET:ChangeThisSecretKeyBeforeGoingToProductionPlease123!}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

# --- Email (SMTP) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Razorpay ---
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_replace_with_key}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:replace_with_secret}

# --- Swagger ---
springdoc.swagger-ui.path=/swagger-ui.html

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
